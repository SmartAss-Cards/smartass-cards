<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You've Got a Smartass Card</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;overflow-x:hidden}
body{font-family:'DM Sans',sans-serif;background:#1C1209;color:#F2E4C8}

/* ENVELOPE STAGE — full screen */
.env-stage{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
  padding:20px;
}
.env-bg{
  position:absolute;inset:0;
  background-image:url('https://raw.githubusercontent.com/SmartAss-Cards/smartass-cards/main/victorian_wallpaper.png');
  background-size:cover;
  background-position:center;
  opacity:0.85;
}
.env-bg-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(28,18,9,0.3) 0%,rgba(28,18,9,0.15) 40%,rgba(28,18,9,0.6) 100%);
}
.ribbon{
  background:#E04820;width:100%;padding:9px;
  text-align:center;font-size:10px;font-weight:700;
  color:#FDF8EF;letter-spacing:2px;text-transform:uppercase;
  position:absolute;top:0;left:0;right:0;z-index:10;
  font-family:'DM Sans',sans-serif;
}

/* RETRO FRAME */
.retro-frame{position:absolute;inset:36px 12px 12px 12px;border:1px solid rgba(200,146,42,0.45);pointer-events:none;z-index:3}
.retro-frame::before{content:'';position:absolute;inset:5px;border:1px solid rgba(200,146,42,0.2)}
.corner{position:absolute;width:18px;height:18px}
.corner-tl{top:-1px;left:-1px;border-top:2px solid #C8922A;border-left:2px solid #C8922A}
.corner-tr{top:-1px;right:-1px;border-top:2px solid #C8922A;border-right:2px solid #C8922A}
.corner-bl{bottom:-1px;left:-1px;border-bottom:2px solid #C8922A;border-left:2px solid #C8922A}
.corner-br{bottom:-1px;right:-1px;border-bottom:2px solid #C8922A;border-right:2px solid #C8922A}

/* RETRO SHAPES */
.retro-shape{position:absolute;pointer-events:none;z-index:4}
.shape-tl{top:48px;left:18px;width:44px;animation:spin1 12s linear infinite}
.shape-bl{bottom:18px;left:20px;width:32px;animation:flicker 4s ease-in-out infinite 1s}
.shape-br{bottom:16px;right:18px;width:40px;animation:spin1 16s linear infinite reverse}
@keyframes spin1{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes flicker{0%,100%{opacity:0.35;transform:scale(1)}50%{opacity:1;transform:scale(1.12)}}

/* TO LABEL */
.to-label{
  font-family:'Playfair Display',serif;
  font-size:11px;letter-spacing:2px;text-transform:uppercase;
  color:#C8922A;margin-bottom:4px;text-align:center;
  position:relative;z-index:5;
  text-shadow:0 1px 6px rgba(0,0,0,0.9);
}
.recip-name{
  font-family:'Playfair Display',serif;
  font-size:32px;color:#F2E4C8;font-weight:500;
  margin-bottom:20px;text-align:center;
  position:relative;z-index:5;
  text-shadow:0 2px 10px rgba(0,0,0,0.9);
}

/* ENVELOPE VIDEO */
.env-video-wrap{
  position:relative;
  width:min(320px, 85vw);
  z-index:5;
}
.env-video{
  width:100%;
  display:block;
  border-radius:8px;
}

/* CARD — hidden behind envelope, rises after video ends */
.card-wrap{
  position:absolute;
  bottom:15%;
  left:50%;
  transform:translateX(-50%) translateY(0px);
  width:min(290px,80vw);
  z-index:4;
  opacity:0;
  transition:none;
}
.card-wrap.rising{
  opacity:1;
  transition:transform 1.1s cubic-bezier(0.2,0.85,0.25,1),
             opacity 0.5s ease;
}
.card-wrap.risen{
  transform:translateX(-50%) translateY(-50vh);
  z-index:20;
}

.card{background:#251810;border-radius:10px;overflow:hidden;border:1px solid #3D2A1A;box-shadow:0 24px 60px rgba(0,0,0,0.9)}
.card-vid-wrap{width:100%;aspect-ratio:1;position:relative;background:#1C1209}
.card-vid-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.card-msg{padding:14px 16px;border-top:1px solid #3D2A1A}
.msg-text{font-family:'Playfair Display',serif;font-size:13px;color:#D9C9A8;font-style:italic;line-height:1.6;margin-bottom:6px}
.msg-sig{font-size:12px;color:#C8922A;display:flex;align-items:center;gap:6px}
.msg-emoji{font-size:18px}

/* AFTER CARD — signers, CTA, footer */
.after-section{
  position:relative;z-index:5;
  width:min(320px,90vw);
  margin-top:12px;
  opacity:0;
  transition:opacity 0.6s ease;
}
.after-section.show{opacity:1}

.signers-box{background:rgba(37,24,16,0.92);border:1px solid #3D2A1A;border-radius:8px;padding:16px;margin-bottom:14px;backdrop-filter:blur(4px)}
.signers-label{font-size:10px;font-weight:600;color:#D9C9A8;text-transform:uppercase;letter-spacing:1px;opacity:0.6;margin-bottom:10px}
.signer-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #3D2A1A}
.signer-item:last-child{border-bottom:none}
.savatar{width:30px;height:30px;border-radius:50%;background:#C13B1B;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#FDF8EF;flex-shrink:0;text-transform:uppercase}
.sname{font-size:13px;font-weight:500;color:#F2E4C8}

.cta-box{background:rgba(37,24,16,0.92);border:1px solid #3D2A1A;border-radius:8px;padding:16px;text-align:center;backdrop-filter:blur(4px);margin-bottom:16px}
.cta-text{font-size:13px;color:#D9C9A8;opacity:0.7;margin-bottom:12px}
.cta-btn{background:#E04820;color:#FDF8EF;text-decoration:none;padding:11px 24px;border-radius:3px;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;display:inline-block;transition:background 0.2s;font-family:'DM Sans',sans-serif}
.cta-btn:hover{background:#C13B1B}

.rec-footer{text-align:center;padding:12px 0}
.rec-footer img{height:22px;opacity:0.35}
.rec-footer p{font-size:10px;color:#D9C9A8;opacity:0.3;margin-top:4px}
</style>
</head>
<body>

<div class="env-stage" id="envStage">
  <div class="env-bg"></div>
  <div class="env-bg-overlay"></div>
  <div class="ribbon">✦ You've got a Smartass Support Card ✦</div>

  <div class="retro-frame">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
  </div>
  <img class="retro-shape shape-tl" src="https://raw.githubusercontent.com/SmartAss-Cards/smartass-cards/main/thick_star.png" alt="">
  <img class="retro-shape shape-bl" src="https://raw.githubusercontent.com/SmartAss-Cards/smartass-cards/main/snofflake_star.png" alt="">
  <img class="retro-shape shape-br" src="https://raw.githubusercontent.com/SmartAss-Cards/smartass-cards/main/science_shape.png" alt="">

  <div class="to-label">A card for</div>
  <div class="recip-name" id="recip-name">Friend</div>

  <!-- ENVELOPE ANIMATION VIDEO -->
  <div class="env-video-wrap">
    <video
      class="env-video"
      id="envVideo"
      autoplay
      muted
      playsinline
      preload="auto"
    >
      <source src="https://raw.githubusercontent.com/SmartAss-Cards/smartass-cards/main/envelope_animation.mp4" type="video/mp4">
    </video>

    <!-- CARD sits behind video, rises after it ends -->
    <div class="card-wrap" id="cardWrap">
      <div class="card">
        <div class="card-vid-wrap">
          <iframe id="card-video" src="" allow="autoplay; fullscreen" allowfullscreen></iframe>
        </div>
        <div class="card-msg">
          <div class="msg-text" id="msg-text"></div>
          <div class="msg-sig">
            <span id="sig-name"></span>
            <span class="msg-emoji" id="sig-emoji"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- SIGNERS + CTA + FOOTER — shown after card rises -->
  <div class="after-section" id="afterSection">
    <div class="signers-box" id="signers-box" style="display:none">
      <div class="signers-label">Also signed by</div>
      <div id="signer-list"></div>
    </div>
    <div class="cta-box">
      <div class="cta-text">Want to send one back?</div>
      <a href="/" class="cta-btn">Shop cards →</a>
    </div>
    <div class="rec-footer">
      <img src="https://images.squarespace-cdn.com/content/v1/6744860d0caea30524e77cd6/3640bf45-f2a6-4471-bc56-5d72af36f428/Logo1.png?format=300w" alt="Smartass Support Cards">
      <p>© 2026 Smartass Support Cards</p>
    </div>
  </div>

</div>

<script>
const CARDS = [
  { id:1, purchaseUrl:"https://player.mediadelivery.net/embed/655040/e0beb112-ea33-4068-9b70-59966cde2bf4?autoplay=true&loop=false&muted=false&preload=true&responsive=true" },
  { id:2, purchaseUrl:"https://player.mediadelivery.net/embed/655040/0d31369f-e31c-493e-8efa-fe9f960af952?autoplay=true&loop=false&muted=false&preload=true&responsive=true" },
  { id:3, purchaseUrl:"https://player.mediadelivery.net/embed/655040/dc8ca812-8174-43f6-b04b-6b4b4a940fbb?autoplay=true&loop=false&muted=false&preload=true&responsive=true" },
  { id:4, purchaseUrl:"https://player.mediadelivery.net/embed/655040/72328498-2dd9-45fb-8210-d8432857e492?autoplay=true&loop=false&muted=false&preload=true&responsive=true" },
  { id:5, purchaseUrl:"https://player.mediadelivery.net/embed/655040/7d26eda2-7c47-4d63-bc89-f90ea280d644?autoplay=true&loop=false&muted=false&preload=true&responsive=true" },
  { id:6, purchaseUrl:"https://player.mediadelivery.net/embed/655040/5d5e606f-0b5c-43a7-a489-573403b21e95?autoplay=true&loop=false&muted=false&preload=true&responsive=true" },
  { id:7, purchaseUrl:"https://player.mediadelivery.net/embed/655040/979bd0c5-c7fd-466a-a5dd-89f6abb1322c?autoplay=true&loop=false&muted=false&preload=true&responsive=true" },
];

function load() {
  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('id')) || 1;
  const from = params.get('from') || 'Your friend';
  const msg = params.get('msg') || '';
  const emoji = params.get('emoji') || '';
  const to = params.get('to') || '';
  const signersRaw = params.get('signers') || '';
  const card = CARDS.find(c => c.id === id) || CARDS[0];

  document.title = `${from} sent you a card — Smartass Support Cards`;
  document.getElementById('recip-name').textContent = to || 'Friend';
  document.getElementById('card-video').src = card.purchaseUrl;
  document.getElementById('msg-text').textContent = msg ? `"${msg}"` : '';
  document.getElementById('sig-name').textContent = `— ${from}`;
  document.getElementById('sig-emoji').textContent = emoji;

  const signers = signersRaw ? signersRaw.split(',').filter(s => s.trim()) : [];
  if (signers.length > 0) {
    document.getElementById('signers-box').style.display = 'block';
    document.getElementById('signer-list').innerHTML = signers.map(s => `
      <div class="signer-item">
        <div class="savatar">${s.trim().charAt(0)}</div>
        <div class="sname">${s.trim()}</div>
      </div>`).join('');
  }
}

// When envelope video ends, rise the card
document.getElementById('envVideo').addEventListener('ended', function() {
  const cardWrap = document.getElementById('cardWrap');
  cardWrap.classList.add('rising');
  // Small delay then trigger the upward movement
  setTimeout(function() {
    cardWrap.classList.add('risen');
  }, 50);
  // Show after section after card has risen
  setTimeout(function() {
    document.getElementById('afterSection').classList.add('show');
  }, 1200);
});

load();
</script>
</body>
</html>
