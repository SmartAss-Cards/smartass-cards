<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You've Got a Smartass Card</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1C1209;
  --bg2:#251810;
  --bg3:#2E1E12;
  --bdr:#3D2A1A;
  --cream:#F2E4C8;
  --cream2:#D9C9A8;
  --red:#C13B1B;
  --red2:#E04820;
  --gold:#C8922A;
  --white:#FDF8EF;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--cream);min-height:100vh}
.ribbon{background:var(--red2);padding:10px 20px;text-align:center}
.ribbon span{font-size:11px;font-weight:700;color:var(--white);text-transform:uppercase;letter-spacing:2px}
.page{display:flex;flex-direction:column;align-items:center;padding:40px 20px 80px}
.from-label{font-size:11px;font-weight:600;color:var(--cream2);opacity:0.55;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;text-align:center}
.from-name{font-family:'Playfair Display',serif;font-size:32px;font-weight:900;color:var(--cream);text-align:center;margin-bottom:28px}
.video-wrap{width:100%;max-width:480px;aspect-ratio:1;border-radius:12px;overflow:hidden;position:relative;margin-bottom:24px;background:var(--bg3)}
.video-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.msg-box{width:100%;max-width:480px;background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:22px 26px;margin-bottom:16px}
.box-label{font-size:11px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.msg-text{font-family:'Playfair Display',serif;font-size:17px;font-style:italic;color:var(--cream);line-height:1.7;margin-bottom:14px}
.msg-sig{font-size:14px;color:var(--cream2);opacity:0.85;display:flex;align-items:center;gap:8px}
.msg-emoji{font-size:20px}
.signers-box{width:100%;max-width:480px;background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:18px 26px;margin-bottom:28px}
.signer-item{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--bdr)}
.signer-item:last-child{border-bottom:none}
.savatar{width:34px;height:34px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--white);flex-shrink:0;text-transform:uppercase}
.sname{font-size:13px;font-weight:500;color:var(--cream)}
.cta-section{text-align:center;margin-bottom:40px}
.cta-text{font-size:13px;color:var(--cream2);opacity:0.6;margin-bottom:16px}
.sendback-btn{background:var(--bg2);border:1px solid var(--red);color:var(--red2);border-radius:5px;padding:13px 32px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none;display:inline-block;transition:all 0.2s}
.sendback-btn:hover{background:var(--red2);color:var(--white);border-color:var(--red2)}
.rec-footer{text-align:center;padding-top:32px;border-top:1px solid var(--bdr);width:100%;max-width:480px}
.rec-footer img{height:24px;opacity:0.4;margin-bottom:8px}
.rec-footer p{font-size:11px;color:var(--cream2);opacity:0.35}
@media(max-width:480px){
  .page{padding:28px 16px 60px}
  .from-name{font-size:26px}
  .msg-box,.signers-box{padding:16px 18px}
  .msg-text{font-size:15px}
}
</style>
</head>
<body>

<div class="ribbon">
  <span>✦ You've got a Smartass Support Card ✦</span>
</div>

<div class="page">
  <div class="from-label">A card from</div>
  <div class="from-name" id="from-name">Your friend</div>

  <div class="video-wrap">
    <iframe id="card-video" src="" allow="autoplay; fullscreen" allowfullscreen></iframe>
  </div>

  <div class="msg-box">
    <div class="box-label">Their message</div>
    <div class="msg-text" id="msg-text"></div>
    <div class="msg-sig">
      <span id="sig-name"></span>
      <span class="msg-emoji" id="sig-emoji"></span>
    </div>
  </div>

  <div class="signers-box" id="signers-box" style="display:none">
    <div class="box-label">Also signed by</div>
    <div id="signer-list"></div>
  </div>

  <div class="cta-section">
    <div class="cta-text">Want to send one back?</div>
    <a href="/" class="sendback-btn">Shop cards →</a>
  </div>

  <div class="rec-footer">
    <img src="https://images.squarespace-cdn.com/content/v1/6744860d0caea30524e77cd6/3640bf45-f2a6-4471-bc56-5d72af36f428/Logo1.png?format=300w" alt="Smartass Support Cards">
    <p>© 2026 Smartass Support Cards</p>
  </div>
</div>

<script>
const CARDS = [
  { id:1, title:"You're Bigger Than This. But I'm Still Better Than You.", purchaseUrl:"https://player.mediadelivery.net/play/655040/e0beb112-ea33-4068-9b70-59966cde2bf4" },
  { id:2, title:"Today Might Suck. But Tomorrow? Tomorrow Might Suck Too.", purchaseUrl:"https://player.mediadelivery.net/play/655040/0d31369f-e31c-493e-8efa-fe9f960af952" },
  { id:3, title:"Thinking of You. Anything More and I Have To Charge.", purchaseUrl:"https://player.mediadelivery.net/play/655040/dc8ca812-8174-43f6-b04b-6b4b4a940fbb" },
  { id:4, title:"Let's Get Lunch. Your Turn To Buy.", purchaseUrl:"https://player.mediadelivery.net/play/655040/72328498-2dd9-45fb-8210-d8432857e492" },
  { id:5, title:"The Lord Replied.", purchaseUrl:"https://player.mediadelivery.net/play/655040/7d26eda2-7c47-4d63-bc89-f90ea280d644" },
  { id:6, title:"I Stopped Celebrating Mine When I Grew Up.", purchaseUrl:"https://player.mediadelivery.net/play/655040/5d5e606f-0b5c-43a7-a489-573403b21e95" },
  { id:7, title:"You Could Have Done More. But Didn't.", purchaseUrl:"https://player.mediadelivery.net/play/655040/979bd0c5-c7fd-466a-a5dd-89f6abb1322c" },
];

function load() {
  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('id'));
  const from = params.get('from') || 'Your friend';
  const msg = params.get('msg') || '';
  const emoji = params.get('emoji') || '';
  const signersRaw = params.get('signers') || '';
  const card = CARDS.find(c => c.id === id) || CARDS[0];

  document.title = `${from} sent you a card — Smartass Support Cards`;
  document.getElementById('from-name').textContent = from;
  document.getElementById('card-video').src = card.purchaseUrl;
  document.getElementById('msg-text').textContent = msg ? `"${msg}"` : '';
  document.getElementById('sig-name').textContent = `— ${from}`;
  document.getElementById('sig-emoji').textContent = emoji;

  const signers = signersRaw ? signersRaw.split(',').filter(s => s.trim()) : [];
  if (signers.length > 0) {
    document.getElementById('signers-box').style.display = 'block';
    document.getElementById('signer-list').innerHTML = signers.map(s => `
      <div class="signer-item">
        <div class="savatar">${s.trim().charAt(0)}</div>
        <div class="sname">${s.trim()}</div>
      </div>`).join('');
  }
}

load();
</script>
</body>
</html>
