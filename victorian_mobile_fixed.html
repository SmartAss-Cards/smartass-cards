<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preview — Victorian Background</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700;900&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh}
body{font-family:'DM Sans',sans-serif;background:#1C1209}
.env-stage{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
.env-bg{position:absolute;inset:0;background-image:url('https://raw.githubusercontent.com/SmartAss-Cards/smartass-cards/main/victorian_wallpaper.png');background-size:cover;background-position:center;opacity:0.85}
.env-bg-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(28,18,9,0.35) 0%,rgba(28,18,9,0.2) 40%,rgba(28,18,9,0.65) 100%)}
.ribbon{background:#E04820;width:100%;padding:9px;text-align:center;font-size:10px;font-weight:700;color:#FDF8EF;letter-spacing:2px;text-transform:uppercase;position:absolute;top:0;left:0;right:0;z-index:10}
.retro-frame{position:absolute;inset:36px 12px 12px 12px;border:1px solid rgba(200,146,42,0.45);pointer-events:none;z-index:3}
.retro-frame::before{content:'';position:absolute;inset:5px;border:1px solid rgba(200,146,42,0.2)}
.corner{position:absolute;width:18px;height:18px}
.corner-tl{top:-1px;left:-1px;border-top:2px solid #C8922A;border-left:2px solid #C8922A}
.corner-tr{top:-1px;right:-1px;border-top:2px solid #C8922A;border-right:2px solid #C8922A}
.corner-bl{bottom:-1px;left:-1px;border-bottom:2px solid #C8922A;border-left:2px solid #C8922A}
.corner-br{bottom:-1px;right:-1px;border-bottom:2px solid #C8922A;border-right:2px solid #C8922A}
.retro-shape{position:absolute;pointer-events:none;z-index:4}
.shape-tl{top:48px;left:18px;width:44px;animation:spin1 12s linear infinite}
.shape-bl{bottom:18px;left:20px;width:32px;animation:flicker 4s ease-in-out infinite 1s}
.shape-br{bottom:16px;right:18px;width:40px;animation:spin1 16s linear infinite reverse}
@keyframes spin1{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes flicker{0%,100%{opacity:0.35;transform:scale(1)}50%{opacity:1;transform:scale(1.12)}}

.to-label{font-family:'Playfair Display',serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#C8922A;margin-bottom:4px;text-align:center;position:relative;z-index:5;text-shadow:0 1px 6px rgba(0,0,0,0.9)}
.recip-name{font-family:'Playfair Display',serif;font-size:32px;color:#F2E4C8;font-weight:500;margin-bottom:20px;text-align:center;position:relative;z-index:5;text-shadow:0 2px 10px rgba(0,0,0,0.9)}

/* STACK: envelope behind, card in front */
.stack{position:relative;width:300px;z-index:5}

/* ENVELOPE — sits at bottom of stack */
.env-wrap{
  position:relative;
  width:300px;
  height:220px;
  cursor:pointer;
  z-index:2;
  filter:drop-shadow(0 8px 24px rgba(0,0,0,0.6));
}
.env-svg{width:300px;height:220px;display:block;transition:opacity 0.3s}
.env-svg.gone{opacity:0;pointer-events:none}
.env-open{position:absolute;inset:0;width:300px;height:220px;opacity:0;transition:opacity 0.3s}
.env-open.show{opacity:1}
.env-seal{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  z-index:8;width:40px;height:40px;
  background:#C13B1B;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;color:#F2E4C8;border:2px solid #D94520;
  font-family:Georgia,serif;
  transition:transform 0.35s ease,opacity 0.25s;
}
.env-seal.gone{transform:translate(-50%,-50%) scale(0);opacity:0}

/* CARD — absolutely positioned over envelope, starts hidden, slides up */
.card-wrap{
  position:absolute;
  bottom:10px;
  left:10px;
  right:10px;
  z-index:1;
  opacity:0;
  transform:translateY(10px);
  transition:transform 1.1s cubic-bezier(0.15,0.85,0.25,1) 0.3s,
             opacity 0.5s ease 0.3s,
             z-index 0s linear 0.3s;
}
.card-wrap.risen{
  opacity:1;
  transform:translateY(-120px);
  z-index:20;
}
.card{
  background:#251810;
  border-radius:10px;
  overflow:hidden;
  border:1px solid #3D2A1A;
  box-shadow:0 24px 56px rgba(0,0,0,0.9);
}
.card-placeholder{width:100%;aspect-ratio:1;background:linear-gradient(135deg,#2E1E12,#1C1209);display:flex;align-items:center;justify-content:center;padding:20px}
.card-placeholder-text{font-family:'Playfair Display',serif;font-size:14px;color:#D9C9A8;text-align:center;line-height:1.5;font-style:italic}
.card-msg-area{padding:14px 16px;border-top:1px solid #3D2A1A}
.msg-text{font-family:'Playfair Display',serif;font-size:13px;color:#D9C9A8;font-style:italic;line-height:1.6;margin-bottom:6px}
.msg-sig{font-size:12px;color:#C8922A}

.hint{font-family:'Playfair Display',serif;font-size:12px;color:#F2E4C8;margin-top:14px;text-align:center;animation:pulse 2s ease-in-out infinite;position:relative;z-index:5;text-shadow:0 1px 6px rgba(0,0,0,0.9)}
.hint.gone{visibility:hidden}
@keyframes pulse{0%,100%{opacity:0.3}50%{opacity:0.9}}
.reset-btn{margin-top:16px;font-size:12px;color:#D9C9A8;background:rgba(28,18,9,0.75);border:1px solid #3D2A1A;border-radius:4px;padding:6px 18px;cursor:pointer;font-family:'DM Sans',sans-serif;position:relative;z-index:5;opacity:0;transition:opacity 0.4s 1.2s;display:block;margin-left:auto;margin-right:auto}
.reset-btn.show{opacity:1}
</style>
</head>
<body>
<div class="env-stage">
  <div class="env-bg"></div>
  <div class="env-bg-overlay"></div>
  <div class="ribbon">✦ You've got a Smartass Support Card ✦</div>
  <div class="retro-frame">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
  </div>
  <img class="retro-shape shape-tl" src="https://raw.githubusercontent.com/SmartAss-Cards/smartass-cards/main/thick_star.png" alt="">
  <img class="retro-shape shape-bl" src="https://raw.githubusercontent.com/SmartAss-Cards/smartass-cards/main/snofflake_star.png" alt="">
  <img class="retro-shape shape-br" src="https://raw.githubusercontent.com/SmartAss-Cards/smartass-cards/main/science_shape.png" alt="">

  <div class="to-label">A card for</div>
  <div class="recip-name">Alex</div>

  <div class="stack">

    <!-- CARD in front, starts hidden -->
    <div class="card-wrap" id="cardWrap">
      <div class="card">
        <div class="card-placeholder">
          <div class="card-placeholder-text">"The Lord Replied."</div>
        </div>
        <div class="card-msg-area">
          <div class="msg-text">"Thinking of you. You've got this."</div>
          <div class="msg-sig">— Sarah ❤️</div>
        </div>
      </div>
    </div>

    <!-- ENVELOPE behind card -->
    <div class="env-wrap" id="envWrap" onclick="openEnv()">

      <!-- CLOSED: cream envelope, flap pointing down, wax seal -->
      <svg class="env-svg" id="envClosed" viewBox="0 0 300 220" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="296" height="216" rx="6" fill="#F2E4C8"/>
        <line x1="2" y1="218" x2="150" y2="130" stroke="#D4C090" stroke-width="1.2"/>
        <line x1="298" y1="218" x2="150" y2="130" stroke="#D4C090" stroke-width="1.2"/>
        <line x1="2" y1="2" x2="2" y2="218" stroke="#D4C090" stroke-width="0.8"/>
        <line x1="298" y1="2" x2="298" y2="218" stroke="#D4C090" stroke-width="0.8"/>
        <polygon points="2,2 298,2 150,120" fill="#EDD9A3"/>
        <line x1="2" y1="2" x2="150" y2="120" stroke="#D4C090" stroke-width="1"/>
        <line x1="298" y1="2" x2="150" y2="120" stroke="#D4C090" stroke-width="1"/>
        <line x1="2" y1="2" x2="298" y2="2" stroke="#C8A870" stroke-width="1"/>
      </svg>

      <!-- OPEN: cream envelope body, off-white torn top edge -->
      <svg class="env-open" id="envOpen" viewBox="0 0 300 220" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="296" height="216" rx="6" fill="#F2E4C8"/>
        <line x1="2" y1="218" x2="150" y2="130" stroke="#D4C090" stroke-width="1.2"/>
        <line x1="298" y1="218" x2="150" y2="130" stroke="#D4C090" stroke-width="1.2"/>
        <line x1="2" y1="2" x2="2" y2="218" stroke="#D4C090" stroke-width="0.8"/>
        <line x1="298" y1="2" x2="298" y2="218" stroke="#D4C090" stroke-width="0.8"/>
        <!-- Off-white open top -->
        <rect x="2" y="2" width="296" height="32" rx="4" fill="#F8F2E4"/>
        <line x1="2" y1="34" x2="298" y2="34" stroke="#D4C090" stroke-width="1" stroke-dasharray="5,4"/>
        <line x1="2" y1="2" x2="298" y2="2" stroke="#E0D0A0" stroke-width="1"/>
      </svg>

      <div class="env-seal" id="envSeal">✦</div>
    </div>

  </div>

  <div class="hint" id="hint">Tap the envelope to open</div>
  <button class="reset-btn" id="resetBtn" onclick="reset()">Start over</button>
</div>

<script>
let opened=false;
function openEnv(){
  if(opened)return;
  opened=true;
  document.getElementById('envWrap').style.cursor='default';
  document.getElementById('hint').classList.add('gone');
  document.getElementById('envSeal').classList.add('gone');
  document.getElementById('envClosed').classList.add('gone');
  document.getElementById('envOpen').classList.add('show');
  document.getElementById('cardWrap').classList.add('risen');
  document.getElementById('resetBtn').classList.add('show');
}
function reset(){
  opened=false;
  document.getElementById('envWrap').style.cursor='pointer';
  document.getElementById('hint').classList.remove('gone');
  document.getElementById('envSeal').classList.remove('gone');
  document.getElementById('envClosed').classList.remove('gone');
  document.getElementById('envOpen').classList.remove('show');
  document.getElementById('cardWrap').classList.remove('risen');
  document.getElementById('resetBtn').classList.remove('show');
}
</script>
</body>
</html>
